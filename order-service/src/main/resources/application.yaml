server:
  port: 8082
spring:
  application:
    name: order-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
    # Sentinel
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: 8720
      eager: true
  datasource:
    # ─── 分库分表模式（默认）：ShardingSphere-JDBC 代理 ───
    # ShardingSphere 接管数据源，应用层完全无感知
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:sharding.yaml
    # ─── 单库模式：注释上面两行，取消注释下面三行 ───
    # url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/bizdb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    # username: ${MYSQL_USER:root}
    # password: ${MYSQL_PASSWORD:root}
    # driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  # ES 大宽表查询地址（跨表 JOIN 走 ES 不走 MySQL）
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}

# MyBatis-Plus
mybatis-plus:
  type-aliases-package: org.order.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Dubbo 服务消费方
dubbo:
  application:
    name: order-service
    qos-enable: false
  registry:
    # 默认 Nacos；切换 ZK：DUBBO_REGISTRY=zookeeper://127.0.0.1:2181
    address: ${DUBBO_REGISTRY:nacos://${NACOS_ADDR:127.0.0.1:8848}}
  consumer:
    timeout: ${DUBBO_CONSUMER_TIMEOUT:3000}
    check: false
    retries: ${DUBBO_CONSUMER_RETRIES:0}

# 订单业务参数（Nacos 可动态调整：@RefreshScope）
order:
  max-quantity-per-request: ${ORDER_MAX_QTY:9}
  risk-control-enabled: ${ORDER_RISK_CONTROL:false}
  default-currency: ${ORDER_DEFAULT_CURRENCY:CNY}
  default-status:   ${ORDER_DEFAULT_STATUS:CREATED}
