# Gateway 推荐把路由规则放 Nacos，支持动态刷新
spring:
  application:
    name: gateway-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
      config:
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
        shared-configs:
          - data-id: common-shared.yaml
            group: DEFAULT_GROUP
            refresh: true
  gateway:
    internal-api:
      secret-key: "a-very-long-and-secure-secret-key-for-hs256-in-production"
      timestamp-validity-ms: 60000 # 60 seconds

security:
  revocation:
    check:
      enabled: true
