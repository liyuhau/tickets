# ============================================================
# Nacos 配置中心 —— 初始化文件（请按下方说明导入到 Nacos 控制台）
# ============================================================
#
# 导入步骤（控制台 http://localhost:8848/nacos  账号 nacos/nacos）：
#
#   配置管理 -> 配置列表 -> "+" 新建配置
#     Data ID = 文件名（含 .yaml 后缀）
#     Group   = DEFAULT_GROUP
#     格式    = YAML
#     内容    = 下方对应段落
#
# 命名规则（Spring Cloud Alibaba 解析顺序）：
#   1. ${spring.application.name}.${file-extension}
#   2. ${spring.application.name}-${profile}.${file-extension}
#   3. shared-configs / extension-configs
# ============================================================

# ---------------- 1. common-shared.yaml ----------------
# 跨服务共享配置（所有微服务都会拉取）
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,metrics

logging:
  level:
    root: INFO
    org.common: DEBUG
    org.springframework.security: INFO

# OAuth2 元数据共享：所有需要的服务都用同一个 issuer-uri
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER:http://127.0.0.1:8081}

# ============ 统一线程池参数（通过 Nacos 控制台动态调整） ============
# 各服务可在自己的 {service}.yaml 中覆盖
thread-pool:
  biz:
    core-size: ${THREAD_POOL_BIZ_CORE:8}
    max-size: ${THREAD_POOL_BIZ_MAX:32}
    queue-capacity: ${THREAD_POOL_BIZ_QUEUE:256}
    keep-alive-seconds: 60
    thread-name-prefix: biz-pool-
  async:
    core-size: ${THREAD_POOL_ASYNC_CORE:4}
    max-size: ${THREAD_POOL_ASYNC_MAX:16}
    queue-capacity: ${THREAD_POOL_ASYNC_QUEUE:512}
    keep-alive-seconds: 120
    thread-name-prefix: async-pool-
  schedule:
    core-size: ${THREAD_POOL_SCHED_CORE:4}
    thread-name-prefix: sched-pool-

# AS 端（user-service）自身 issuer；resourceserver 端通过 issuer-uri 拉公钥
oauth2:
  issuer: ${OAUTH2_ISSUER:http://127.0.0.1:8081}

# ============================================================
# Dubbo 统一治理配置
# ============================================================
dubbo:
  # 全局注册中心
  registry:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}
    parameters:
      namespace: ${NACOS_NAMESPACE:public}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

  # 全局协议配置
  protocol:
    name: dubbo
    port: -1 # -1 表示随机端口

  # 全局服务提供方配置
  provider:
    timeout: 3000       # 默认服务执行超时 3s
    threads: 200        # 默认业务线程池 200
    # 核心服务（如交易、库存）可单独配置更细的线程池模型
    # threadpool: fixed
    # accepts: 500
    # dispatcher: message # 消息派发也进线程池，避免IO线程阻塞
    # iothreads: 4

  # 全局服务消费方配置
  consumer:
    timeout: 5000       # 默认调用超时 5s
    retries: 1          # 默认重试 1 次（总共调用 2 次）
    check: false        # 启动时不检查依赖的服务是否可用（可改为 true 强制检查）
    # 针对特定服务的特定方法，可以覆盖以上配置
    # 例如，对 inventory-service 的 deductStock 方法禁用重试
    # inventory-service:
    #   methods:
    #     deductStock:
    #       retries: 0
